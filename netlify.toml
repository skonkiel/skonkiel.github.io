[build]
  publish = "public"
  command = "hugo"

[build.environment]
  HUGO_VERSION = "0.88.1"
  NODE_VERSION = "16"
  GO_VERSION = "1.17"

# Security settings
[build.processing]
  skip_processing = false
[build.processing.css]
  bundle = true
  minify = true
[build.processing.js]
  bundle = true
  minify = true
[build.processing.html]
  pretty_urls = true
[build.processing.images]
  compress = true

# Security headers are in _headers file

# Enable branch deploys with preview
[context.deploy-preview]
  command = "hugo -b $DEPLOY_PRIME_URL --buildFuture"

[context.branch-deploy]
  command = "hugo -b $DEPLOY_PRIME_URL --buildFuture"

# Asset optimization
[build.processing.images]
  compress = true

# Security-related build settings
[build.environment]
  NODE_ENV = "production"
  HUGO_ENV = "production"

# Deploy settings
[deploy]
  edge_handlers = true  # Enable edge handlers for better security
  
# Netlify security features
[dev]
  framework = "#custom"
  targetPort = 1313
  autoLaunch = false
  command = "hugo server"

# Asset security
[build.processing]
  skip_processing = false
[build.processing.html]
  pretty_urls = true
  minify = true

# Function settings with security headers
[functions]
  directory = "functions"
  node_bundler = "esbuild"

[[plugins]]
  package = "@netlify/plugin-lighthouse"

[[plugins]]
  package = "netlify-plugin-submit-sitemap"

[[plugins]]
  package = "netlify-plugin-checklinks"

[[plugins]]
  package = "@netlify/plugin-sitemap"

# Redirect all traffic to HTTPS
[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://skonkiel.github.io/*"
  to = "https://skonkiel.github.io/:splat"
  status = 301
  force = true

# Security headers are managed in _headers file

# Enable Netlify Identity with secure settings
[template.environment]
  NETLIFY_IDENTITY_REGISTRATION = "false"  # Disable public registration
  NETLIFY_IDENTITY_WEBHOOK = ""  # Set up in Netlify UI for security 